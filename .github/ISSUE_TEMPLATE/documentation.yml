name: 📝 Documentation Issue
description: Report an issue with the documentation or suggest an improvement
labels: ["documentation"]
assignees: []
body:
  - type: markdown
    attributes:
      value: |
        Found something confusing, missing, or incorrect in the docs? Let us know!

  - type: dropdown
    id: type
    attributes:
      label: Type of Documentation Issue
      options:
        - "❌ Incorrect information"
        - "🔍 Missing information"
        - "🌀 Confusing / unclear"
        - "💀 Broken link"
        - "🔧 Outdated content"
        - "✍️ Typo / grammar"
    validations:
      required: true

  - type: input
    id: location
    attributes:
      label: Location
      description: Which file or page has the issue? (e.g., README.md, docs/architecture.md, /admin setup section)
    validations:
      required: true

  - type: textarea
    id: description
    attributes:
      label: Description
      description: What is the issue? What should it say instead?
    validations:
      required: true

  - type: checkboxes
    id: checklist
    attributes:
      label: Before Submitting
      options:
        - label: I searched existing issues and this is not a duplicate
          required: true

---
name: ❓ Question
description: Ask a question about the project
labels: ["question"]
assignees: []
body:
  - type: markdown
    attributes:
      value: |
        **Before asking**, please check:
        - [README.md](../../README.md)
        - [docs/](../../docs/)
        - [Existing issues](../../issues)

  - type: textarea
    id: question
    attributes:
      label: Your Question
      description: Be as specific as possible.
    validations:
      required: true

  - type: textarea
    id: context
    attributes:
      label: Context
      description: What are you trying to achieve? What have you already tried?
